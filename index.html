<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda</title>
    <link rel="shortcut icon" href="icono.png" type="image/x-icon">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Por si no tienes estilos.css, aquí unos básicos */
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 900px; margin: auto; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        th { background: #f0f0f0; }
        form { margin: 10px 0; }
        input { padding: 5px; margin: 5px; }
        button { padding: 6px 12px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Productos</h2>

    <form id="formAgregar">
        <input type="text" id="nombre" placeholder="Nombre" required>
        <input type="number" id="cantidad" placeholder="Cantidad" required min="0">
        <input type="number" id="precio" step="0.01" placeholder="Precio" required min="0">
        <button type="submit">Agregar</button>
    </form>

    <table>
        <thead>
            <tr>
                <th>ID</th><th>Nombre</th><th>Cantidad</th><th>Precio</th><th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tablaProductos">
        </tbody>
    </table>

    <h3>Ventas realizadas</h3>
    <table>
        <thead>
            <tr>
                <th>ID Producto</th><th>Nombre</th><th>Cantidad Vendida</th><th>Total</th>
            </tr>
        </thead>
        <tbody id="tablaVentas">
        </tbody>
    </table>

    <button onclick="mostrarParticipantes()">Ver participantes</button>
    
    <script>
        // Simulamos la "base de datos" con localStorage
        let productos = JSON.parse(localStorage.getItem('productos')) || [];
        let ventas = JSON.parse(localStorage.getItem('ventas')) || [];
        let idActual = productos.length > 0 ? Math.max(...productos.map(p => p.id)) + 1 : 1;

        function guardarDatos() {
            localStorage.setItem('productos', JSON.stringify(productos));
            localStorage.setItem('ventas', JSON.stringify(ventas));
        }

        function renderizarTablas() {
            const tbodyProductos = document.getElementById('tablaProductos');
            const tbodyVentas = document.getElementById('tablaVentas');
            tbodyProductos.innerHTML = '';
            tbodyVentas.innerHTML = '';

            productos.forEach(prod => {
                tbodyProductos.innerHTML += `
                    <tr>
                        <td>${prod.id}</td>
                        <td>${prod.nombre}</td>
                        <td>${prod.cantidad}</td>
                        <td>$${prod.precio.toFixed(2)}</td>
                        <td>
                            <form onsubmit="venderProducto(event, ${prod.id})">
                                <input type="number" name="cantidadvender" placeholder="Cantidad" required min="1" max="${prod.cantidad}">
                                <button type="submit">Vender</button>
                            </form>
                        </td>
                    </tr>
                `;
            });

            ventas.forEach(venta => {
                tbodyVentas.innerHTML += `
                    <tr>
                        <td>${venta.idProducto}</td>
                        <td>${venta.nombre}</td>
                        <td>${venta.cantidadVendida}</td>
                        <td>$${venta.total.toFixed(2)}</td>
                    </tr>
                `;
            });
        }

        document.getElementById('formAgregar').addEventListener('submit', function(e) {
            e.preventDefault();
            const nombre = document.getElementById('nombre').value;
            const cantidad = parseInt(document.getElementById('cantidad').value);
            const precio = parseFloat(document.getElementById('precio').value);

            productos.push({ id: idActual++, nombre, cantidad, precio });
            guardarDatos();
            renderizarTablas();
            this.reset();
            alert('Producto agregado');
        });

        function venderProducto(e, id) {
            e.preventDefault();
            const form = e.target;
            const cantidadVender = parseInt(form.cantidadvender.value);
            const producto = productos.find(p => p.id === id);

            if (cantidadVender > producto.cantidad) {
                alert('No hay suficiente stock');
                return;
            }

            producto.cantidad -= cantidadVender;
            const total = cantidadVender * producto.precio;

            ventas.push({
                idProducto: id,
                nombre: producto.nombre,
                cantidadVendida: cantidadVender,
                total: total
            });

            guardarDatos();
            renderizarTablas();
            alert('Venta realizada');
        }

        function mostrarParticipantes(){
            alert(/n- heidi elizabeth salvador pascual\n- naydelin natasha bacilio flores");
        }

        // Cargar datos al abrir la página
        renderizarTablas();
    </script>
</body>
</html>
